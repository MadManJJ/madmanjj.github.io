name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: true 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: swatinem/rust-cache@v2

      - name: Install Dioxus CLI (Binary)
        run: |
          wget -qO- https://github.com/DioxusLabs/dioxus/releases/latest/download/dx-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          chmod +x dx
          sudo mv dx /usr/local/bin/

      - name: Build
        run: dx build --release --platform web 

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/personal-site/release/web/public

      - id: deployment
        uses: actions/deploy-pages@v4
